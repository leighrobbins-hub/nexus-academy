<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nexus Academy — Nexus Merit: combined XP across life sciences, math, and ELA." />
  <title>Nexus Merit — Nexus Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05060a;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --life: #5eead4;
      --math: #38bdf8;
      --ela: #f59e0b;
      --card: #0c1018;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -20%, rgba(94, 234, 212, 0.08), transparent 50%),
        radial-gradient(circle at 100% 80%, rgba(56, 189, 248, 0.06), transparent 40%),
        radial-gradient(circle at 0% 60%, rgba(245, 158, 11, 0.05), transparent 45%);
      pointer-events: none;
      z-index: -1;
    }
    .wrap { width: min(52rem, calc(100% - 2rem)); margin: 0 auto; padding: 2.5rem 0 3.5rem; }
    .nav { margin-bottom: 1.75rem; }
    .nav a { font-size: 0.9rem; font-weight: 600; color: var(--life); text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .logo {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--life);
      margin-bottom: 0.65rem;
    }
    h1 { font-size: clamp(1.65rem, 1.1rem + 2vw, 2.2rem); font-weight: 700; margin: 0 0 0.5rem; }
    .sub { color: var(--muted); max-width: 52ch; margin: 0 0 2rem; }
    .total-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(12,16,24,0.95));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 1.5rem 1.65rem;
      margin-bottom: 2rem;
    }
    .total-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.75rem; align-items: baseline; margin-bottom: 0.75rem; }
    .total-label { font-size: 0.85rem; color: var(--muted); }
    .total-xp { font-size: 1.35rem; font-weight: 700; }
    .total-bar { height: 14px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .total-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--life), var(--math), var(--ela));
      width: 0%;
      transition: width 0.5s ease;
    }
    .rank { margin-top: 1rem; font-size: 0.95rem; color: var(--muted); }
    .rank strong { color: var(--text); }
    .grid { display: grid; gap: 1rem; }
    @media (min-width: 720px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    .track {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 1.2rem 1.3rem;
    }
    .track.life { border-top: 3px solid var(--life); }
    .track.math { border-top: 3px solid var(--math); }
    .track.ela { border-top: 3px solid var(--ela); }
    .track h2 { margin: 0 0 0.5rem; font-size: 1rem; }
    .track .xp { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .mini-bar { height: 8px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
    .track.life .mini-fill { background: linear-gradient(90deg, #2dd4bf, var(--life)); }
    .track.math .mini-fill { background: linear-gradient(90deg, #0284c7, var(--math)); }
    .track.ela .mini-fill { background: linear-gradient(90deg, #b45309, var(--ela)); }
    .track a { display: inline-block; margin-top: 0.85rem; font-size: 0.88rem; font-weight: 600; text-decoration: none; }
    .track.life a { color: var(--life); }
    .track.math a { color: var(--math); }
    .track.ela a { color: var(--ela); }
    .track a:hover { text-decoration: underline; }
    footer { margin-top: 2.5rem; text-align: center; font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="nav"><a href="nexus.html">← Nexus Academy</a></p>
    <p class="logo">Nexus Merit</p>
    <h1>All three tracks at a glance</h1>
    <p class="sub">Each game can earn up to <strong>2400 XP</strong>. Nexus Merit is the sum—up to <strong>7200</strong> when you max everything.</p>
    <div id="root"></div>
    <footer>Nexus Merit · Three tracks, one scoreboard</footer>
  </div>
  <script src="gene-code-game.js"></script>
  <script src="js/orbital-game.js"></script>
  <script src="js/lexicon-game.js"></script>
  <script src="js/nexus-academy.js"></script>
  <script>
    (function () {
      function cadetRank(total) {
        if (total >= 6500) return "Archon Cadet";
        if (total >= 5000) return "Vanguard";
        if (total >= 3500) return "Pathfinder";
        if (total >= 2000) return "Specialist";
        if (total >= 500) return "Trainee";
        return "Recruit";
      }
      var agg = NexusAcademy.getAggregate();
      var g1 = agg.geneCode;
      var g2 = agg.orbital;
      var g3 = agg.lexicon;
      var total = agg.total;
      var maxT = agg.maxTotal;
      var pct = Math.min(100, (total / maxT) * 100);
      var p1 = Math.min(100, (g1 / 2400) * 100);
      var p2 = Math.min(100, (g2 / 2400) * 100);
      var p3 = Math.min(100, (g3 / 2400) * 100);

      var root = document.getElementById("root");
      var html = "";
      html += '<div class="total-card">';
      html += '<div class="total-row"><span class="total-label">Nexus Merit (sum of career XP)</span>';
      html += '<span class="total-xp">' + total + " / " + maxT + "</span></div>";
      html += '<div class="total-bar" role="progressbar" aria-valuenow="' + total + '" aria-valuemin="0" aria-valuemax="' + maxT + '">';
      html += '<div class="total-fill" style="width:' + pct + '%"></div></div>';
      html += '<p class="rank"><strong>' + cadetRank(total) + "</strong> — keep training across life, logic, and language.</p>";
      html += "</div>";

      html += '<div class="grid">';
      html += '<div class="track life"><h2>Life · Gene Code</h2><div class="xp">' + g1 + " / 2400</div>";
      html += '<div class="mini-bar"><div class="mini-fill" style="width:' + p1 + '%"></div></div>';
      html += '<a href="hub.html">Open Gene Code hub →</a></div>';

      html += '<div class="track math"><h2>Logic · Orbital</h2><div class="xp">' + g2 + " / 2400</div>";
      html += '<div class="mini-bar"><div class="mini-fill" style="width:' + p2 + '%"></div></div>';
      html += '<a href="math/hub.html">Open Orbital Academy →</a></div>';

      html += '<div class="track ela"><h2>Language · Lexicon</h2><div class="xp">' + g3 + " / 2400</div>";
      html += '<div class="mini-bar"><div class="mini-fill" style="width:' + p3 + '%"></div></div>';
      html += '<a href="ela/hub.html">Open Guild hub →</a></div>';
      html += "</div>";
      root.innerHTML = html;
    })();
  </script>
</body>
</html>
